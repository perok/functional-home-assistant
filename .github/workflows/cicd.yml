# CI + CD in one pipeline.
#
# ci: every PR, merge-queue entry, and main push — test + assemble the fat jar (scoped to
#     fh-datastar-view: home/home-codegen need live-HA codegen and cannot
#     compile in CI; tests run on fake dumps, no HA needed).
# cd: main only, after ci is green. Publishes ONLY when home-addon/config.yaml
#     names a version that is not on GHCR yet: builds the add-on container
#     (amd64 + aarch64) from the ci-built jar, pushes
#     ghcr.io/perok/fh-dashboard:{X.Y.Z, latest}, and creates the vX.Y.Z tag +
#     GitHub release. So releasing = merging a version bump; an unchanged
#     version makes cd a no-op. (The supervisor reads config.yaml from main to
#     offer updates, so main's version and the published image can never
#     drift.) workflow_dispatch re-runs are idempotent via the same check.
name: CICD

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/perok/fh-dashboard

permissions:
  contents: write # cd creates the release tag
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      # The editor's CodeMirror + lsp-client deps are esbuild-bundled into
      # resources/editor/vendor.js, which sbt then packages into the fat jar.
      # vendor.js is NOT committed (it's gitignored) — CI is its source of
      # truth; `npm ci` pins to package-lock.json for a reproducible bundle.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: modules/fh-datastar-view/editor-src/package-lock.json

      - name: Vendor editor front-end (esbuild)
        working-directory: modules/fh-datastar-view/editor-src
        run: npm ci && npm run build

      - name: Test
        run: sbt 'fh-datastar-view/testFull'

      - name: Assemble fat jar
        run: sbt 'fh-datastar-view/assembly'

      - name: Upload jar for cd
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: addon-jar
          path: target/addon/fh-dashboard.jar
          retention-days: 1

  cd:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version, skip if already on GHCR
        id: ver
        run: |
          VERSION="$(sed -n 's/^version: *"\{0,1\}\([^"]*\)"\{0,1\}$/\1/p' home-addon/config.yaml)"
          if [ -z "$VERSION" ]; then
            echo "could not read version from home-addon/config.yaml" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if docker manifest inspect "$IMAGE:$VERSION" >/dev/null 2>&1; then
            echo "$IMAGE:$VERSION already published — nothing to do"
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch ci-built jar
        if: steps.ver.outputs.published == 'false'
        uses: actions/download-artifact@v4
        with:
          name: addon-jar
          path: target/addon/

      # QEMU: the Dockerfile's jlink stage must execute under linux/arm64
      # during the multi-arch build.
      - uses: docker/setup-qemu-action@v3
        if: steps.ver.outputs.published == 'false'
      - uses: docker/setup-buildx-action@v3
        if: steps.ver.outputs.published == 'false'

      - uses: docker/login-action@v3
        if: steps.ver.outputs.published == 'false'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        if: steps.ver.outputs.published == 'false'
        with:
          context: .
          file: home-addon/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest
          labels: |
            io.hass.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.source=https://github.com/perok/functional-home-assistant

      - name: Tag + GitHub release
        if: steps.ver.outputs.published == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --target "$GITHUB_SHA" --generate-notes \
            --title "v${{ steps.ver.outputs.version }}"

# Build check for PRs and main. Scoped to fh-datastar-view: the home /
# home-codegen modules need live-HA codegen (gitignored generated sources)
# and cannot compile in CI. Tests need no live HA (fake-dump fixtures).
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Test
        run: sbt 'fh-datastar-view/testFull'

      - name: Assemble fat jar
        run: sbt 'fh-datastar-view/assembly'

# Release: on tag vX.Y.Z, build the add-on container (amd64 + aarch64) and
# push it to GHCR as ghcr.io/perok/fh-dashboard:{X.Y.Z, latest}.
#
# The add-on version in home-addon/config.yaml is bumped MANUALLY before
# tagging; the gate below refuses to publish a mismatch. After the FIRST
# release, make the GHCR package public (the HA supervisor pulls
# unauthenticated): github.com/users/perok/packages → fh-dashboard →
# settings → visibility.
name: Release

on:
  push:
    tags: ["v*"]

env:
  IMAGE: ghcr.io/perok/fh-dashboard

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check config.yaml version matches the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CONFIG_VERSION="$(sed -n 's/^version: *"\{0,1\}\([^"]*\)"\{0,1\}$/\1/p' home-addon/config.yaml)"
          if [ "$VERSION" != "$CONFIG_VERSION" ]; then
            echo "Tag v$VERSION does not match home-addon/config.yaml version $CONFIG_VERSION" >&2
            echo "Bump config.yaml (and commit) before tagging." >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Test
        run: sbt 'fh-datastar-view/testFull'

      - name: Assemble fat jar
        # Produces target/addon/fh-dashboard.jar, which the Dockerfile COPYs.
        run: sbt 'fh-datastar-view/assembly'

      # QEMU: the Dockerfile's jlink stage must execute under linux/arm64
      # during the multi-arch build.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: home-addon/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:latest
          labels: |
            io.hass.version=${{ env.VERSION }}
            org.opencontainers.image.source=https://github.com/perok/functional-home-assistant
